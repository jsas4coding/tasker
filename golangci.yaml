# golangci-lint v2 configuration
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

output:
  formats:
    colored-line-number:
      path: stdout
  sort-order:
    - linter
    - file

linters:
  default: none
  enable:
    # Default linters
    - errcheck
    - govet
    - staticcheck
    - unused

    # Code quality
    - bodyclose
    - durationcheck
    - errorlint
    - exhaustive
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gosec
    - misspell
    - nakedret
    - nilerr
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - wastedassign
    - whitespace

  exclusions:
    warn-unused: true
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
          - goconst
          - errcheck

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - fieldalignment

  staticcheck:
    checks: ["all"]

  goconst:
    min-len: 3
    min-occurrences: 3

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - whyNoLint
      - hugeParam

  gocyclo:
    min-complexity: 15

  godot:
    scope: toplevel
    capital: true

  gosec:
    excludes:
      - G104
    config:
      G306: "0644"

  misspell:
    locale: US

  nakedret:
    max-func-lines: 30

  prealloc:
    simple: true
    range-loops: true
    for-loops: true

  revive:
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  unparam:
    check-exported: false

severity:
  default: warning
  case-sensitive: false

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - "tasker.jsas.dev"
