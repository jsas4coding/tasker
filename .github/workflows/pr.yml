# ┌──────────────────────────────────────────────────────┐
# │  Tasker — Pull Request Quality Gate                  │
# │  Lint · Security · Test · Build                      │
# └──────────────────────────────────────────────────────┘

name: "🔍 Quality Gate"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────
  # Lint — go vet + golangci-lint
  # ───────────────────────────────────────────────────────
  lint:
    name: "🧹 Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m ./...

  # ───────────────────────────────────────────────────────
  # Security — govulncheck + dependency audit
  # ───────────────────────────────────────────────────────
  security:
    name: "🛡️ Security"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Verify dependencies
        run: go mod verify

      - name: Check for tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  # ───────────────────────────────────────────────────────
  # Test — race detector + coverage
  # ───────────────────────────────────────────────────────
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests with race detector
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ───────────────────────────────────────────────────────
  # Build — verify compilation across platforms
  # ───────────────────────────────────────────────────────
  build:
    name: "🔨 Build (${{ matrix.goos }}/${{ matrix.goarch }})"
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o /dev/null ./cmd/tasker

  # ───────────────────────────────────────────────────────
  # Schema — validate schemas are valid JSON Schema
  # ───────────────────────────────────────────────────────
  schema:
    name: "📐 Schema Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON schemas
        run: |
          for f in schemas/*.json; do
            echo "Validating $f..."
            python3 -c "import json; json.load(open('$f'))" || exit 1
          done
          echo "All schemas are valid JSON"

      - name: Verify embedded schemas match canonical
        run: |
          diff schemas/tasker.schema.json internal/config/schemas/tasker.schema.json
          diff schemas/tasks.schema.json internal/config/schemas/tasks.schema.json
          echo "Embedded schemas are in sync"
